<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المعهد العالي للهندسة والتكنولوجيا بكفر الشيخ</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;direction:rtl;overflow-x:hidden;}
.hero{height:100vh;position:relative;overflow:hidden;}
.slide{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;opacity:0;transform:scale(1.1);transition:opacity 1.5s, transform 6s;}
.slide.active{opacity:1;transform:scale(1);}
.overlay{position:absolute;width:100%;height:100%;background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.7));}
#particles-js{position:absolute;width:100%;height:100%;z-index:1;}
.hero-content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:white;width:80%;z-index:2;}
.hero-content h1{font-size:55px;margin-bottom:20px;white-space:pre-wrap;}
.hero-content p{font-size:24px;margin-bottom:35px;}
.buttons a{padding:14px 32px;margin:10px;border-radius:6px;text-decoration:none;font-size:18px;transition:.3s;}
.btn-main{background:#0b3d91;color:white;}
.btn-main:hover{background:#072c68;}
.btn-outline{border:2px solid white;color:white;}
.btn-outline:hover{background:white;color:black;}
.indicators{position:absolute;bottom:35px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:2;}
.dot{width:12px;height:12px;border-radius:50%;background:white;opacity:.5;}
.dot.active{opacity:1;transform:scale(1.3);}
.scroll{position:absolute;bottom:25px;right:30px;color:white;font-size:30px;animation:bounce 2s infinite;z-index:2;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(10px);}}
</style>
</head>
<body>

<section class="hero">

<div id="particles-js"></div>

<!-- slides 6 صور -->
<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1509062522246-3755977927d7')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1523580846011-d3a5bc25702b')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1581092918056-0c4c3acd3789')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1537432376769-00a171e90f1b')"></div>

<div class="overlay"></div>

<div class="hero-content">
<h1 id="title"></h1>
<p id="text">نقدم تعليماً متميزاً لإعداد كوادر قادرة على مواكبة التطور التكنولوجي</p>
<div class="buttons">
<a href="#" class="btn-main">تعرف على المعهد</a>
<a href="#" class="btn-outline">الأقسام العلمية</a>
</div>
</div>

<div class="indicators">
<div class="dot active"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<div class="scroll">↓</div>

</section>

<script>
let slides=document.querySelectorAll(".slide");
let dots=document.querySelectorAll(".dot");
let title=document.getElementById("title");
let text=document.getElementById("text");
let index=0;

let titles=[
"المعهد العالي للهندسة والتكنولوجيا بكفر الشيخ يرحب بكم",
"تعليم هندسي وتكنولوجي بمستوى متميز",
"بيئة تعليمية حديثة تدعم الإبداع والبحث العلمي",
"إعداد جيل قادر على الابتكار والتطوير",
"تخريج كوادر متميزة قادرة على المنافسة عالمياً",
"تعليم عملي ونظري مدمج لإعداد مهندسين متميزين"
];

let texts=[
"نقدم تعليماً متميزاً لإعداد كوادر قادرة على مواكبة التطور التكنولوجي",
"نحرص على تقديم برامج تعليمية حديثة تواكب سوق العمل",
"ندعم الإبداع والتطوير في مختلف المجالات الهندسية والتكنولوجية",
"هدفنا تخريج مهندسين قادرين على الابتكار",
"نضمن للطلاب مهارات عالية لمستقبل مشرق",
"بيئة تعليمية متكاملة تجمع المعرفة والخبرة العملية"
];

// Typing effect يحافظ على المسافات
function typeText(element, text, speed, callback){
    let i=0;
    element.innerText="";
    let interval=setInterval(()=>{
        element.innerText+=text.charAt(i);
        i++;
        if(i>=text.length){
            clearInterval(interval);
            if(callback) callback();
        }
    },speed);
}

// أول نص الترحيب مع كتابة حرف بحرف
typeText(title, titles[0], 80, ()=>{
    // بعد الكتابة 2 ثانية ثابتة ثم بدء السلايدر
    setTimeout(()=>{
        setInterval(changeSlide,3000);
    },2000);
});

function changeSlide(){
    slides[index].classList.remove("active");
    dots[index].classList.remove("active");
    index=(index+1)%slides.length;
    slides[index].classList.add("active");
    dots[index].classList.add("active");
    title.innerText=titles[index];
    text.innerText=texts[index];
}

/* particles */
particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
color:{value:"#ffffff"},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.3
},
move:{speed:2}
}
});
</script>

</body>
</html>
