<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #020617, #0f172a); color: white; min-height: 100vh; overflow-x: hidden; }
        .container { width: 85%; max-width: 1200px; margin: auto; padding-bottom: 50px; }

        /* الهيدر: عنوان في المنتصف وزر على اليسار */
        .header-area { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-top: 60px; margin-bottom: 40px; }
        .header-text { grid-column: 2; text-align: center; }
        .header-text h1 { font-size: clamp(28px, 5vw, 45px); white-space: nowrap; }
        .header-text p { font-size: 18px; color: #94a3b8; }
        .nav-actions { grid-column: 3; display: flex; justify-content: flex-end; }

        .btn-home {
            background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 18px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .btn-home:hover { background: #0ea5e9; border-color: #0ea5e9; transform: scale(1.05); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        .card {
            background: rgba(255, 255, 255, .07); padding: 20px; border-radius: 15px; text-align: center;
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(255, 255, 255, .1); overflow: hidden;
        }
        .card:hover { transform: translateY(-8px); background: rgba(255, 255, 255, .1); }

        .img-wrapper { width: 100%; height: 150px; border-radius: 10px; margin-bottom: 15px; background: #1e293b; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s; }
        .img-loaded { opacity: 1 !important; }

        #years, #subjects { display: none; margin-top: 20px; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .subject {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, .05); padding: 15px 20px; border-radius: 12px;
            margin-bottom: 12px; border-right: 4px solid #0ea5e9;
        }

        .buttons { display: flex; gap: 8px; }
        .btn-action {
            text-decoration: none; padding: 8px 16px; border-radius: 8px;
            font-weight: bold; font-size: 14px; color: white; transition: 0.2s;
        }
        .view { background: #0ea5e9; }
        .download { background: #22c55e; }
        .view:hover { background: #0284c7; }
        .download:hover { background: #16a34a; }

        .back { margin-top: 30px; text-align: center; }
        .back button { padding: 10px 25px; border: none; background: #334155; color: white; border-radius: 8px; cursor: pointer; }

        @media (max-width: 600px) { .header-area { display: flex; flex-direction: column; gap: 15px; } .nav-actions { justify-content: center; } }
    </style>
</head>

        let currentMajor;

        function goHome() {
            document.getElementById("years").style.display = "none";
            document.getElementById("subjects").style.display = "none";
            document.getElementById("majors").style.display = "grid";
            document.getElementById("sub-title").innerText = "اختر التخصص";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showYears(major) {
            currentMajor = major;
            document.getElementById("majors").style.display = "none";
            document.getElementById("years").style.display = "block";
            document.getElementById("majorName").innerText = major;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showSubjects(year) {
            document.getElementById("years").style.display = "none";
            document.getElementById("subjects").style.display = "block";
            document.getElementById("yearName").innerText = currentMajor + " - " + year;
            
            const list = data[currentMajor][year];
            let html = "";
            list.forEach(item => {
                html += `
                <div class="subject">
                    <span>${item.title}</span>
                    <div class="buttons">
                        <a href="${item.link}" target="_blank" class="btn-action view">عرض</a>
                        <a href="${item.link}" download class="btn-action download">تحميل</a>
                    </div>
                </div>`;
            });
            document.getElementById("subjectsList").innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backMajors() { goHome(); }
        function backYears() {
            document.getElementById("subjects").style.display = "none";
            document.getElementById("years").style.display = "block";
