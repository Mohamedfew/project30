<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب طالب</title>
  <link rel="stylesheet" href="/css/regiser.css">
</head>
<body>
  <div class="container">
    <h2>إنشاء حساب الطالب</h2>

    <form id="registerForm">
      <label>الاسم الكامل:</label>
      <input type="text" id="name" placeholder="ادخل اسمك الكامل" required>

      <label>البريد الإلكتروني:</label>
      <input type="email" id="email" placeholder="example@email.com" required>

      <label>كلمة المرور:</label>
      <input type="password" id="password" placeholder="ادخل كلمة المرور" required>

      <button type="submit">إنشاء الحساب</button>
    </form>

    <p>لديك حساب بالفعل؟ <a href="index.html">تسجيل الدخول</a></p>
  </div>
  
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="/js/regiser.js"></script>
</body>
</html>
