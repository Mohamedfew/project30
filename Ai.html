<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مساعد معهد كفر الشيخ الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0f2b5b; --gold: #c5a059; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; }
        #ai-container { position: fixed; bottom: 20px; right: 20px; z-index: 10000; }
        #open-chat { background: var(--blue); color: white; border: 2px solid var(--gold); padding: 12px 25px; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); font-weight: bold; }
        #chat-window { width: 360px; height: 500px; background: white; border-radius: 20px; position: absolute; bottom: 70px; right: 0; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #ddd; }
        .hidden { display: none !important; }
        .header { background: var(--blue); color: white; padding: 15px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; }
        .msgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 14px; max-width: 80%; line-height: 1.5; }
        .ai { background: white; border-right: 4px solid var(--gold); align-self: flex-start; }
        .user { background: var(--blue); color: white; align-self: flex-end; }
        .footer { padding: 12px; border-top: 1px solid #eee; display: flex; gap: 8px; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px 15px; border-radius: 25px; outline: none; }
        #send { background: var(--blue); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div id="ai-container">
    <button id="open-chat" onclick="toggleChat()">اسأل مساعد المعهد الذكي</button>
    <div id="chat-window" class="hidden">
        <div class="header">
            <span>مساعد المعهد الذكي</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer;">&times;</button>
        </div>
        <div id="chatBox" class="msgs">
            <div class="msg ai">أهلاً بك يا عمرو! أنا مساعد معهد كفر الشيخ الذكي، جرب تسألني دلوقتي وهرد عليك.</div>
        </div>
        <div id="typing" class="hidden" style="padding: 5px 20px; font-size: 11px; color: #888;">جاري التفكير...</div>
        <div class="footer">
            <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') startChat()">
            <button id="send" onclick="startChat()">➤</button>
        </div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI, HarmCategory, HarmBlockThreshold } from "https://esm.run/@google/generative-ai";

    const API_KEY = "AIzaSyAMdPpuG7hRjyrZoeSu3FpbzFqOHwXgOss"; // مفتاحك الجديد
    const genAI = new GoogleGenerativeAI(API_KEY);

    window.toggleChat = function() {
        document.getElementById('chat-window').classList.toggle('hidden');
    }

    window.startChat = async function() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('chatBox');
        const typing = document.getElementById('typing');

        if (!input.value.trim()) return;

        const msg = input.value;
        box.innerHTML += `<div class="msg user">${msg}</div>`;
        input.value = "";
        typing.classList.remove('hidden');
        box.scrollTop = box.scrollHeight;

        try {
            // إضافة إعدادات الأمان لضمان عدم حظر أي محتوى
            const safetySettings = [
                { category: HarmCategory.HARM_CATEGORY_HARASSMENT, threshold: HarmBlockThreshold.BLOCK_NONE },
                { category: HarmCategory.HARM_CATEGORY_HATE_SPEECH, threshold: HarmBlockThreshold.BLOCK_NONE },
                { category: HarmCategory.HARM_CATEGORY_SEXUALLY_EXPLICIT, threshold: HarmBlockThreshold.BLOCK_NONE },
                { category: HarmCategory.HARM_CATEGORY_DANGEROUS_CONTENT, threshold: HarmBlockThreshold.BLOCK_NONE },
            ];

            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash", safetySettings });
            const result = await model.generateContent(msg);
            const response = await result.response;
            
            typing.classList.add('hidden');
            box.innerHTML += `<div class="msg ai">${response.text()}</div>`;
        } catch (e) {
            typing.classList.add('hidden');
            // إظهار الخطأ الحقيقي عشان نعرف المشكلة فين بالظبط
            box.innerHTML += `<div class="msg ai" style="color:red">خطأ: ${e.message}</div>`;
            console.error(e);
        }
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
