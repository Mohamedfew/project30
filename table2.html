<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعلام الجداول - المعهد العلمي</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --glow-color: #00d2ff;
            --bg-dark: #0b0e14;
            --card-bg: #161b26;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
        }

        /* Navbar Style */
        .navbar {
            background: rgba(18, 22, 31, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            padding: 12px 0;
        }
        .navbar-brand img {
             max-height: 50px; filter: drop-shadow(0 0 8px var(--glow-color));
            
            border-radius: 30px;}

        /* Main Container */
        .filter-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(0, 210, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin-top: 50px;
        }

        .form-label { color: var(--glow-color); font-weight: 700; margin-bottom: 10px; display: block; }
        
        .form-select {
            background-color: #0b0e14;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
        }
        .form-select:focus {
            border-color: var(--glow-color);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
            background-color: #0b0e14; color: white;
        }

        /* Image Display Area */
        .result-section {
            display: none;
            margin-top: 40px;
            text-align: center;
        }

        .image-frame {
            padding: 10px;
            background: linear-gradient(45deg, var(--glow-color), transparent);
            border-radius: 15px;
            display: inline-block;
            max-width: 100%;
        }

        .table-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 3px solid var(--card-bg);
        }

        .btn-glow {
            background: var(--glow-color);
            color: #000;
            font-weight: 700;
            padding: 15px 50px;
            border-radius: 50px;
            border: none;
            box-shadow: 0 0 20px var(--glow-color);
            transition: 0.3s;
        }
        .btn-glow:hover { transform: scale(1.05); background: white; }

        .section-title { font-weight: 900; margin-top: 40px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="home.html">
                <img src="/img/308637959_456080916556158_4041691296448312269_n.png" alt="Logo">
            </a>
            <div class="ms-auto">
                <a href="home.html" class="btn btn-outline-info btn-sm">العودة للرئيسية</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                
                <div class="text-center section-title">
                    <h2>بوابة <span style="color: var(--glow-color);">الاستعلام عن الجداول</span></h2>
                    <p class="text-secondary">اختر نوع الجدول والبيانات المطلوبة لعرضه</p>
                </div>

                <div class="filter-card">
                    <div class="row g-4">
                        <div class="col-md-4">
                            <label class="form-label">1. نوع الجدول:</label>
                            <select class="form-select" id="tableType">
                                <option value="" selected disabled>اختر النوع...</option>
                                <option value="lectures">جدول المحاضرات</option>
                                <option value="exams">جدول الامتحانات</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">2. التخصص:</label>
                            <select class="form-select" id="dept">
                                <option value="" selected disabled>اختر القسم...</option>
                                <option value="mis">نظم معلومات</option>
                                <option value="mis"> الادارة والمحاسبة</option>
                                <option value="mis">علوم حاسب</option>
                                <option value="mis"> العلوم الاساسية</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">3. الفرقة الدراسية:</label>
                            <select class="form-select" id="level">
                                <option value="" selected disabled>اختر الفرقة...</option>
                                <option value="1">الأولى</option>
                                <option value="2">الثانية</option>
                                <option value="3">الثالثة</option>
                                <option value="4">الرابعة</option>
                            </select>
                        </div>
                    </div>

                    <div class="text-center mt-5">
                        <button class="btn btn-glow" onclick="getSchedule()">عرض الجدول الآن</button>
                    </div>
                </div>

                <div class="result-section" id="resultArea">
                    <h3 id="displayTitle" class="mb-4"></h3>
                    <div class="image-frame">
                        <img src="" id="scheduleImg" class="table-img" alt="الجدول">
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function getSchedule() {
            const type = document.getElementById('tableType').value;
            const dept = document.getElementById('dept').value;
            const level = document.getElementById('level').value;
            
            const imgElement = document.getElementById('scheduleImg');
            const resultArea = document.getElementById('resultArea');
            const displayTitle = document.getElementById('displayTitle');

            if(!type || !dept || !level) {
                alert("برجاء إكمال جميع الاختيارات");
                return;
            }

            // --- منطق اختيار الصور من جهازك ---
            // يمكنك تسمية الصور في مجلد img مثلاً (lectures_eng_1.jpg) لتسهيل الربط
            
            let imageName = "";

            // مثال: إذا اختار محاضرات + هندسة + فرقة أولى
            if(type === "lectures" && dept === "mis" && level === "1" || level === "2" ||  level === "3" ||  level === "4") {
                imageName = "/img/1-3.jpg"; // ضع اسم صورتك الحقيقي هنا
            } 
            else if(type === "exams" && dept === "mis" && level === "1") {
                imageName = "img/1-4.jpg";
            }

            // أضف باقي الاحتمالات هنا بنفس الطريقة...
            else {
                // صورة افتراضية في حال لم تضع المسار بعد
                imageName = "https://via.placeholder.com/800x1100?text=Image+Not+Found";
            }

            // تحديث الواجهة
            imgElement.src = imageName;
            displayTitle.innerText = "عرض " + (type === 'lectures' ? 'جدول المحاضرات' : 'جدول الامتحانات');
            resultArea.style.display = "block";
            
            // التمرير لأسفل لرؤية الجدول
            window.scrollTo({ top: resultArea.offsetTop - 50, behavior: 'smooth' });
        }
    </script>
</body>
</html>
